<!doctype html>
<html>
  <head></head>
  <body>
    <script>
      let hour = new Date().getHours();
      if (hour >= 6 && hour <= 12) {
        console.log("Good morning");
      } else if (hour >= 13 && hour <= 17) {
        console.log("Good afternoon");
      } else {
        console.log("Good night");
      }

      console.log(hour);
    </script>
  </body>
</html>
<!-- creating a variable called hour and saving current hour of the day(24 hr format-->
