<!doctype html>
<html>
  <head>
    <title>HTML CSS Review</title>
    <style>
      /*
      This is a css comment
      */
      .red-button {
        background-color: red;
        color: white;
        border: none;
      }

      .yellow-button {
        background-color: yellow;
      }
    </style>
  </head>

  <body>
    <!--This is a html comment-->
    <button
      title="HTML attribute called tooltip"
      class="red-button"
      onclick="alert('Good job!')"
    >
      Hello
    </button>

    <p>paragraph of <button class="yellow-button">sup!</button> text</p>

    <script>
      // This code creates a pop up
      // alert("hello faith!");
      console.log(2 + 2); // displays whatever in the code in the
      // console
      console.log("some" + "text");
    </script>
  </body>
</html>
